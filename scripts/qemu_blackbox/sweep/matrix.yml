# Stage W single-axis sweep definition for 014/015 bisection.
# See docs/superpowers/specs/2026-04-16-fio-014-015-segmented-bisection-design.md
baseline:
  rw: randrw
  rwmixread: 70
  bs: 4k
  direct: 1
  ioengine: libaio
  iodepth: 64
  numjobs: 1
  size: 1G
  io_size: 2G
  verify: crc32c
  verify_fatal: 0
  verify_async: 4
  do_verify: 1
  randrepeat: 0
  name: sweep

axes:
  - name: iodepth
    points: [1, 4, 16, 64]
  - name: rwmix
    fio_param: rwmixread
    points: [0, 70, 100]
  - name: numjobs
    points: [1, 2, 4]
  - name: verify_async
    points: [0, 2, 4]
  - name: bs
    points: [4k, 16k]

repeats: 3
format_between_axis_switch: true
