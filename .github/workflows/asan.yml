name: AddressSanitizer

# Pillar 5a — Memory safety. Builds with ASan and runs unit tests +
# system tests. Any ASan report (heap-buffer-overflow, use-after-free,
# stack-buffer-overflow, etc.) is a hard CI failure.
#
# Budget: ~5 min on ubuntu-latest (ASan instrumentation slows execution
# ~2x vs normal build).

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  asan:
    name: ASan (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build with ASan
        run: make ASAN=1 all

      - name: Run unit tests under ASan
        run: make ASAN=1 test

      - name: Run system tests under ASan
        timeout-minutes: 10
        run: make ASAN=1 systest
