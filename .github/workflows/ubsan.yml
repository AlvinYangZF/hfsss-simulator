name: UndefinedBehaviorSanitizer

# Pillar 5a — Memory safety (UB subset). Builds with UBSan and runs
# unit tests + system tests. Catches signed integer overflow, null
# pointer dereference, misaligned access, shift-out-of-range, etc.
#
# Budget: ~3 min on ubuntu-latest (UBSan overhead is lighter than ASan).

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  ubsan:
    name: UBSan (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build with UBSan
        run: make UBSAN=1 all

      - name: Run unit tests under UBSan
        run: make UBSAN=1 test

      - name: Run system tests under UBSan
        run: make UBSAN=1 systest
