name: QEMU Blackbox (manual scaffold)

# DORMANT SCAFFOLD — not an active CI gate yet.
#
# This workflow is a MANUAL-ONLY scaffold for the QEMU blackbox test
# framework. It provides the job shape, the runner choice, the build step,
# and the case-filter mechanics, so that once the missing pieces land it
# can be turned into an active smoke gate with a minimal diff.
#
# What is NOT here yet (and why the workflow stays workflow_dispatch-only):
#
#   1. Guest image provisioning. The runner needs
#        guest/alpine-hfsss.qcow2
#        guest/cidata.iso
#        guest/ovmf_vars-saved.fd
#      A clean GitHub-hosted runner has none of them, and this workflow
#      deliberately does NOT ship a download step yet — guest-image
#      distribution (GitHub Release assets or S3) is still being designed.
#      Without a download step, push:[master] would always skip-green,
#      which would be a worse-than-useless signal. So the push trigger
#      is intentionally NOT wired.
#
#   2. Harness stability on default smoke cases. A reviewer's local
#      run on a real 16GB exported device turned up brittle assertions
#      in cases/nvme/002_nvme_namespace_info.sh and 003_nvme_flush_smoke.sh.
#      Those are PR #39 harness follow-ups, tracked separately.
#
# Before activating this as a real regression gate, TWO things must land:
#   (a) A guest-asset download step in this workflow (Release-based).
#   (b) Fixes for the brittle 002/003 assertions (separate follow-up PR).
# Once both exist, add back:
#     push: { branches: [master] }
# and (optionally) pull_request: { branches: [master] }.
#
# Runner choice: macos-latest (Apple Silicon, macOS 14+) has native HVF
# acceleration for aarch64 guests, matching the existing guest image.
# A Linux x86_64 runner would need a separate x86_64 guest image (future).

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "NBD mode (sync/mt/async)"
        required: false
        default: "mt"
      case_filter:
        description: "Substring filter on case name (e.g. 001_nvme_cli_smoke). Empty = all nvme-cli cases."
        required: false
        default: ""

jobs:
  blackbox-smoke:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU
        run: |
          brew install qemu

      - name: Build HFSSS (targeted — NBD server only)
        # The blackbox runner only needs hfsss-nbd-server (env.sh itself uses
        # the same targeted build when HFSSS_BUILD_NBD=1). Avoids pulling in
        # targets the smoke suite doesn't exercise.
        run: make directories build/bin/hfsss-nbd-server

      - name: Check guest image availability
        id: guest
        run: |
          if [ -f guest/alpine-hfsss.qcow2 ] \
             && [ -f guest/cidata.iso ] \
             && [ -f guest/ovmf_vars-saved.fd ]; then
            echo "present=1" >> "$GITHUB_OUTPUT"
          else
            echo "present=0" >> "$GITHUB_OUTPUT"
            # Scaffold mode: this workflow is workflow_dispatch only, so a
            # missing-assets dispatch is a USER ERROR, not a silent pass.
            # Fail the job so the dispatcher knows to provision assets
            # locally first (e.g. mount via self-hosted runner or await
            # the Release-based download step).
            echo "::error::guest/ image assets not present. This is a dormant scaffold — provision guest assets on your runner before dispatching, or wait for the Release-based download step."
            exit 1
          fi

      - name: Assemble case list
        id: cases
        if: steps.guest.outputs.present == '1'
        run: |
          FILTER="${{ github.event.inputs.case_filter }}"
          CASES=()
          if [ -z "$FILTER" ]; then
            # Default smoke subset: all nvme-cli cases (fast, no perf load)
            while IFS= read -r c; do
              CASES+=("$(basename "$c")")
            done < <(ls scripts/qemu_blackbox/cases/nvme/*.sh)
          else
            # Filter mode: include only cases whose name contains FILTER
            while IFS= read -r c; do
              name="$(basename "$c")"
              if [[ "$name" == *"$FILTER"* ]]; then
                CASES+=("$name")
              fi
            done < <(find scripts/qemu_blackbox/cases -type f -name '*.sh')
            # Fail fast when the filter matches nothing — previously this
            # fell through to the runner with no --case args, which the
            # runner interprets as "run everything", hiding the typo.
            if [ "${#CASES[@]}" -eq 0 ]; then
              echo "::error::case_filter='$FILTER' matched no cases under scripts/qemu_blackbox/cases. Aborting."
              exit 1
            fi
          fi
          # Emit selected case list for transparency in the job log
          printf 'Selected cases (%d):\n' "${#CASES[@]}"
          printf '  %s\n' "${CASES[@]}"
          # Hand the list to the next step via a newline-delimited file
          printf '%s\n' "${CASES[@]}" > "$RUNNER_TEMP/cases.txt"

      - name: Run blackbox smoke subset
        if: steps.guest.outputs.present == '1'
        run: |
          ARGS=(--guest-dir "$(pwd)/guest" --skip-build --mode "${{ github.event.inputs.mode || 'mt' }}")
          while IFS= read -r c; do
            [ -n "$c" ] && ARGS+=(--case "$c")
          done < "$RUNNER_TEMP/cases.txt"
          bash scripts/run_qemu_blackbox_ci.sh "${ARGS[@]}"

      - name: Upload blackbox artifacts
        if: always() && steps.guest.outputs.present == '1'
        uses: actions/upload-artifact@v4
        with:
          name: blackbox-smoke-artifacts
          path: build/blackbox-tests/latest/
          retention-days: 14
