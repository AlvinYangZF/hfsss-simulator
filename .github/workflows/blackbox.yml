name: QEMU Blackbox

# Pillar 3 — System Correctness (E2E, guest OS). Real Linux kernel
# sending NVMe commands over NBD to the HFSSS simulator.
#
# Two jobs:
#   blackbox-smoke  — per-PR gate, nvme-cli + lightweight fio (~8 min)
#   blackbox-full   — nightly full matrix, all cases × async mode (~30 min)
#
# Runner: self-hosted Mac Studio (Apple Silicon, HVF acceleration).
# Guest assets pre-provisioned under ./guest/ on the runner host.
# Register a runner with the `hfsss-blackbox` label:
#   https://docs.github.com/en/actions/hosting-your-own-runners

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  schedule:
    # Nightly at 06:00 UTC (02:00 EDT)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "NBD mode (sync/mt/async)"
        required: false
        default: "async"
      case_filter:
        description: "Substring filter on case name. Empty = default smoke bundle."
        required: false
        default: ""

env:
  # Guest assets live on the self-hosted runner at a fixed path.
  # Override with runner-level env var HFSSS_GUEST_DIR if needed.
  HFSSS_GUEST_DIR: /Users/zifengyang/Desktop/hfsss-simulator/guest

jobs:
  blackbox-smoke:
    name: blackbox-smoke
    if: github.event_name != 'schedule'
    runs-on: [self-hosted, hfsss-blackbox]
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify QEMU + guest assets
        run: |
          command -v qemu-system-aarch64 >/dev/null \
            || { echo "::error::qemu-system-aarch64 not on PATH"; exit 1; }
          qemu-system-aarch64 --version | head -n 1
          UEFI_FD="${HFSSS_QEMU_CODE_FD:-/opt/homebrew/share/qemu/edk2-aarch64-code.fd}"
          for f in "$HFSSS_GUEST_DIR/alpine-hfsss.qcow2" \
                   "$HFSSS_GUEST_DIR/cidata.iso" \
                   "$HFSSS_GUEST_DIR/ovmf_vars-saved.fd" \
                   "$UEFI_FD"; do
            [ -f "$f" ] || { echo "::error::missing $f"; exit 1; }
          done
          echo "Guest assets OK at $HFSSS_GUEST_DIR"
          echo "UEFI firmware OK at $UEFI_FD"

      - name: Build HFSSS (NBD server)
        run: make directories build/bin/hfsss-nbd-server

      - name: Assemble case list
        id: cases
        run: |
          FILTER="${{ github.event.inputs.case_filter || '' }}"
          CASES=()
          if [ -z "$FILTER" ]; then
            CASES=(
              "001_nvme_cli_smoke.sh"
              "002_nvme_namespace_info.sh"
              "003_nvme_flush_smoke.sh"
              "005_nvme_get_set_features_smoke.sh"
              "006_nvme_smart_log_smoke.sh"
              "020_fio_pr_smoke_seqwrite_verify.sh"
              "021_fio_pr_smoke_randwrite_verify.sh"
            )
          else
            while IFS= read -r c; do
              name="$(basename "$c")"
              if [[ "$name" == *"$FILTER"* ]]; then
                CASES+=("$name")
              fi
            done < <(find scripts/qemu_blackbox/cases -type f -name '*.sh')
            if [ "${#CASES[@]}" -eq 0 ]; then
              echo "::error::case_filter='$FILTER' matched no cases. Aborting."
              exit 1
            fi
          fi
          printf 'Selected cases (%d):\n' "${#CASES[@]}"
          printf '  %s\n' "${CASES[@]}"
          printf '%s\n' "${CASES[@]}" > "$RUNNER_TEMP/cases.txt"

      - name: Run blackbox smoke
        run: |
          MODE="${{ github.event.inputs.mode || 'async' }}"
          ARGS=(--guest-dir "$HFSSS_GUEST_DIR" --skip-build --mode "$MODE")
          while IFS= read -r c; do
            [ -n "$c" ] && ARGS+=(--case "$c")
          done < "$RUNNER_TEMP/cases.txt"
          bash scripts/run_qemu_blackbox_ci.sh "${ARGS[@]}"

      - name: Upload blackbox artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blackbox-smoke-artifacts
          path: build/blackbox-tests/latest/
          retention-days: 14

  blackbox-full:
    name: blackbox-full (nightly)
    if: github.event_name == 'schedule'
    runs-on: [self-hosted, hfsss-blackbox]
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify QEMU + guest assets
        run: |
          command -v qemu-system-aarch64 >/dev/null \
            || { echo "::error::qemu-system-aarch64 not on PATH"; exit 1; }
          UEFI_FD="${HFSSS_QEMU_CODE_FD:-/opt/homebrew/share/qemu/edk2-aarch64-code.fd}"
          for f in "$HFSSS_GUEST_DIR/alpine-hfsss.qcow2" \
                   "$HFSSS_GUEST_DIR/cidata.iso" \
                   "$HFSSS_GUEST_DIR/ovmf_vars-saved.fd" \
                   "$UEFI_FD"; do
            [ -f "$f" ] || { echo "::error::missing $f"; exit 1; }
          done

      - name: Build HFSSS (NBD server)
        run: make directories build/bin/hfsss-nbd-server

      - name: Run full blackbox matrix (async mode)
        run: |
          bash scripts/run_qemu_blackbox_ci.sh \
            --guest-dir "$HFSSS_GUEST_DIR" \
            --skip-build \
            --mode async \
            --size-mb 2048

      - name: Upload blackbox artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blackbox-full-artifacts
          path: build/blackbox-tests/latest/
          retention-days: 30
