name: ThreadSanitizer

# Pillar 5b — Concurrency safety. Builds with TSan and runs only the
# MT-specific test subset (TAA, MT FTL, GC MT, inflight pool).
# Any data race report is a hard CI failure.
#
# Budget: ~5 min on ubuntu-latest.

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  tsan:
    name: TSan (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build MT test binaries with TSan
        run: |
          make TSAN=1 directories \
            build-tsan/bin/test_taa \
            build-tsan/bin/test_mt_ftl \
            build-tsan/bin/test_gc_mt \
            build-tsan/bin/test_inflight_pool

      - name: Run MT tests under TSan
        run: |
          build-tsan/bin/test_taa
          build-tsan/bin/test_mt_ftl
          build-tsan/bin/test_gc_mt
          build-tsan/bin/test_inflight_pool
